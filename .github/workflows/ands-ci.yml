name: ANDS CI

on:
  push:
    branches: [main, 'claude/*']
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Audit tokens (sample)
        run: |
          pnpm tsx packages/ands-cli/src/bin.ts audit-tokens \
            --token-index packages/foundation-tokens/dist/tokens.index.json \
            --dir examples/feature-lab/editable-form-example/src \
            || true
